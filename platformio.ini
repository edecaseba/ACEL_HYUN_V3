; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = nanoatmega328

[env:nanoatmega328]
platform = atmelavr
board = nanoatmega328
framework = arduino
upload_speed = 115200
build_flags = 
    -std=gnu++17
    -Wall
    -Wextra
    -Werror
    -Wno-unused-parameter  ; <-- Ignora parámetros sin usar (necesario por el core de Arduino)
    -Werror=return-type
    -Os
    -Wno-unknown-pragmas

[env:native]
platform = native
build_flags =
    -std=c++20
    -Wall
    -Wextra
    -Werror
    -Wno-unknown-pragmas
    -I test
build_src_filter = +<test/test_runner.cpp> +<test/test_pid.cpp> +<test/test_overcurrent.cpp> +<test/mock_arduino.cpp>